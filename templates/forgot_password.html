<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center min-h-screen bg-gray-200">

<div class="bg-white p-10 rounded-2xl shadow-2xl w-[400px]">

    <h2 class="text-2xl font-bold mb-6 text-center">
        Reset Password via Phone
    </h2>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="text-green-600 mb-4 text-center">
                {{ messages[0] }}
            </div>
        {% endif %}
    {% endwith %}

    <!-- ฟอร์มกรอกเบอร์ -->
    <form method="POST" class="mb-6">
        <label class="block mb-2">Phone Number</label>
        <input type="text" name="phone"
               class="w-full p-3 border rounded-lg mb-4"
               placeholder="Enter your phone number"
               required>

        <button class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700 transition">
            Send OTP
        </button>
    </form>

    <hr class="my-6">

    <!-- ฟอร์มกรอก OTP -->
    <form method="POST">
        <label class="block mb-2">Enter OTP</label>
        <input type="text" name="otp_input"
               class="w-full p-3 border rounded-lg mb-4"
               placeholder="Enter 6-digit OTP"
               required>

        <button class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition">
            Verify OTP
        </button>
    </form>

    <div class="text-center mt-6">
        <a href="{{ url_for('login') }}" class="text-indigo-600 hover:underline">
            Back to Login
        </a>
    </div>

</div>

</body>
</html>
