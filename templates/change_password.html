<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-100">

    <div class="bg-white p-8 rounded-lg shadow-md w-96">

        <h2 class="text-xl font-semibold mb-6 text-center">
            Change Password
        </h2>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="text-red-500 text-sm mb-4 text-center">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST">

            <div class="mb-4">
                <label class="block text-sm mb-1">Old Password</label>
                <input type="password" name="old_password" required
                       class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-1 focus:ring-indigo-500">
            </div>

            <div class="mb-6">
                <label class="block text-sm mb-1">New Password</label>
                <input type="password" name="new_password" required
                       class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-1 focus:ring-indigo-500">
            </div>

            <div class="flex justify-between items-center">
                <a href="{{ url_for('profile') }}" class="text-sm text-gray-500 hover:underline">
                    Back
                </a>

                <button class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">
                    Save
                </button>
            </div>

        </form>

    </div>

</body>
</html>
